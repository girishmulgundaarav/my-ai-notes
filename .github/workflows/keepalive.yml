name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every Monday and Thursday
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: SUPABASE_URL and SUPABASE_ANON_KEY secrets must be set."
            exit 1
          fi
          
          echo "Pinging Supabase Auth Settings API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/auth/v1/settings" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          if [ "$response" != "200" ]; then
            echo "Failed to ping Supabase! HTTP Status Code: $response"
            exit 1
          else
            echo "Successfully pinged Supabase."
          fi
